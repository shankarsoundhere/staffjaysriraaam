<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slot Page</title>

<style>
body { font-family: Arial; margin:10px; }

h3 {
    text-align:center;
}

table {
    width:100%;
    border-collapse: collapse;
}

td {
    border:1px solid black;
    padding:4px;
    text-align:center;
}

input {
    width:100%;
    border:none;
    text-align:center;
    outline:none;
}
</style>
</head>

<body>

<h3>Slot Detail</h3>

<table>

<tr>
<td><input id="date" placeholder="Date"></td>
<td><input id="place" placeholder="Place"></td>
<td><input id="work" placeholder="Work"></td>
</tr>

</table>

<br>

<button onclick="saveData()">💾 Save</button>

<script>
// slot number URL से आएगा
const params = new URLSearchParams(window.location.search);
const slot = params.get("slot");

// unique keys for each slot
function key(name){
    return name + "_" + slot;
}

// load data
window.onload = function(){
    document.getElementById("date").value = localStorage.getItem(key("date")) || "";
    document.getElementById("place").value = localStorage.getItem(key("place")) || "";
    document.getElementById("work").value = localStorage.getItem(key("work")) || "";
}

// save data
function saveData(){
    localStorage.setItem(key("date"), document.getElementById("date").value);
    localStorage.setItem(key("place"), document.getElementById("place").value);
    localStorage.setItem(key("work"), document.getElementById("work").value);

    alert("Saved Slot " + slot);
}
</script>

</body>
</html>
