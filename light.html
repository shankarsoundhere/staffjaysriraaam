<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>लाइट मिस्त्री</title>

<style>
body { margin:0; font-family: Arial; background:#f1f3f6; }
.header {
    background:#6200ea;
    color:white;
    text-align:center;
    padding:15px;
    font-size:20px;
}
.container { padding:10px; }

.card {
    background:white;
    margin-bottom:10px;
    padding:12px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">💡 लाइट मिस्त्री</div>

<div class="container">

<div class="card" onclick="openSlot(1)">Slot 1</div>
<div class="card" onclick="openSlot(2)">Slot 2</div>
<div class="card" onclick="openSlot(3)">Slot 3</div>
<div class="card" onclick="openSlot(4)">Slot 4</div>
<div class="card" onclick="openSlot(5)">Slot 5</div>
<div class="card" onclick="openSlot(6)">Slot 6</div>
<div class="card" onclick="openSlot(7)">Slot 7</div>

</div>

<center><a href="index.html">⬅ वापस जाए</a></center>

<script>
function openSlot(n){
    location.href = "light-slot.html?slot=" + n;
}
</script>

</body>
</html>
