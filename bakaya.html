<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Udhaari List</title>

<style>
body {
  font-family: Arial;
  background:#dcdde1;
  padding:10px;
}

.box {
  background:#f1f2f6;
  padding:12px;
  margin:12px 0;
  border-radius:15px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.top {
  display:flex;
  gap:10px;
  font-size:14px;
  font-weight:bold;
}

.top span {
  background:#dfe4ea;
  padding:3px 8px;
  border-radius:8px;
}

.detail {
  margin-top:6px;
  font-size:13px;
}

.bottom {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:8px;
}

.nameBox { font-size:14px; }

.number {
  display:none;
  font-size:13px;
  color:blue;
}

.toggle {
  font-size:12px;
  color:blue;
  cursor:pointer;
}

.btnGroup {
  display:flex;
  gap:8px;
}

.btn {
  padding:7px 12px;
  background:linear-gradient(45deg,#28a745,#34d058);
  color:white;
  border-radius:25px;
  text-decoration:none;
  font-size:12px;
  font-weight:bold;
}

.single .btn2 {
  display:none;
}
</style>
</head>

<body>

<!-- 🔥 10 BOX START -->

<!-- 1 -->
<div class="box single">
  <div class="top">
    <span>20-04-2026</span>
    <span>DJ</span>
    <span>गोसाईं टोला</span>
  </div>
<!-- detail में यहां पर Note लिखना है।-->
  <div class="detail">500 में बात था, 300 दिया, 200 बाकी</div>
  <div class="bottom">
    <div class="nameBox">
<!-- Person Emoji के बगल में नाम लिखना है।-->
      👤 Ramesh <span class="toggle" onclick="toggleNumber(0)">Show</span><br>
!-- is number में यहां पर Show, Hide करने वाला नंबर लिखना है।-->
      <span class="number" id="num0">📞 9876543210</span>
    </div>
    <div class="btnGroup">
!-- यहां पर सिर्फ नंबर लिखना है।-->
      <a href="tel:9876543210" class="btn">📞 Call</a>
      <a href="tel:9876543211" class="btn btn2">📞 Call</a>
    </div>
  </div>
</div>

<
    </div>
    <div class="btnGroup">
      <a href="tel:9000000002" class="btn">📞 Call</a>
      <a href="tel:9111111111" class="btn btn2">📞 Call</a>
    </div>
  </div>
</div>

<script>
function toggleNumber(i){
  let num = document.getElementById("num"+i);
  num.style.display = (num.style.display==="block") ? "none" : "block";
}
</script>

</body>
</html>
